<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./assets/styles/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.0/css/all.min.css"
    integrity="sha512-9xKTRVabjVeZmc+GUW8GgSmcREDunMM+Dt/GrzchfN8tkwHizc5RP4Ok/MXFFy5rIjJjzhndFScTceq5e6GvVQ=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Etech LandingPage</title>
</head>

<body>
  <div class="container">
    <!-- Header Area -->
    <header class="header">
      <div class="wrapper">
        <div class="header-logo">
          <div>
            <img src="assets/images/White_logo.png" alt="">
          </div>
          <!-- Menu toggle -->
          <div class="menu-toggle">
            <input type="checkbox" name="" id="menucheckbox" class="menucheckbox" hidden>
            <!-- Overlay -->
            <label for="menucheckbox" class="menu-overlay"></label>
            <!-- Menu Drawer -->
            <div class="menu-drawer">
              <nav>
                <ul>
                  <li><a href="#">Home</a></li>
                  <li><a href="#">Games</a></li>
                  <li><a href="#">News</a></li>
                  <li><a href="#">Math</a></li>
                  <li><a href="#">Company</a></li>
                  <li><a href="#">Events</a></li>
                  <li><a href="#">Partners</a></li>
                </ul>
              </nav>
            </div>
          </div>
          <label for="menucheckbox" class="toggle-menu">
            <i class="fa-solid fa-bars"></i>
          </label>

        </div>

        <nav class="navbar">
          <a href="#" class="nav-item">Home</a>
          <a href="#" class="nav-item">Games</a>
          <a href="#" class="nav-item">News</a>
          <a href="#" class="nav-item">Math</a>
          <a href="#" class="nav-item">Company</a>
          <a href="#" class="nav-item">Events</a>
          <a href="#" class="nav-item">Partners</a>
        </nav>

      </div>
    </header>

    <main>
      <div class="slice">
        <div class="wrapper banner-item">
          <img src="https://www.pgsoft.com/uploads/Games/Images/baf9142e-3fe5-4de8-8a21-44579f07b20c.jpg" alt="banner"
            class="banner-item__pc">
          <img src="assets/images/ImageChicken.png" alt="banner" class="banner-item__mobile">
          <!--Overlay -->
          <div class="chicky-run">
            <p>Chicky Run</p>
            <p>Game Detail <span><i class='fas fa-arrow-right'></i></span></p>
          </div>
          <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>
        </div>
      </div>

      <!-- Content Area -->
      <div class="container-content">
        <!-- Sidebar -->
        <aside>
          <div class="sidebar">
            <div class="search-box">
              <i class="fas fa-magnifying-glass"></i>
              <input type="text" placeholder="Search...">
            </div>
            <ul class="menu">
              <li class="menu-item">
                <div class="icon-menu">
                  <img src="assets/images/Icon20_HomePage.facb932.svg.png" alt="" />
                </div>
                <p>Games Home</p>
              </li>
              <li class="menu-item">
                <div class="icon-menu">
                  <img src="assets/images/Icon20_TimeLinePage.5d075c0.svg.png" alt="icon-bag" />
                </div>
                <p>Timeline</p>
              </li>
              <li class="menu-item">
                <div class="icon-menu">
                  <img src="assets/images/Icon20_AllGame.a302cd6.svg.png" alt="icon-allgame" />
                </div>
                <p>All Games</p>
              </li>
            </ul>

          </div>
        </aside>
      </div>
    </main>



  </div>
</body>
<script src="assets/scripts/main.js"></script>

</html>
